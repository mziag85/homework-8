<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet" />
</head>
<body>


<div class="container">

    <div class="wrapper">
        <h1>სარეგისტრაციო ფორმა</h1>
        <form class="form">
        <!-- სახელი -->
         <div class="field">
          <label for="name">შეიყვანეთ თქვენი სახელი, გვარი</label>
          <input type="text" name="name" id="name" class="input">
         </div>
            <!-- სქესი -->
            <div class="radio">
              <p>აირჩიე სქესი</p>
              <input type="radio" id="option1" name="gender" value="1" />
              <label for="option1">მდედრ.</label>
              <input type="radio" id="option2" name="gender" value="2" />
              <label for="option2">მამრ.</label>
            </div>

         <!-- ტელეფონი -->
         <div class="field">
          <label for="tel">შეიყვანეთ თქვენი ტელეფონის ნომერი</label>
          <input type="text" name="tel" id="tel" class="input">
         </div>
         <!-- პაროლი -->
        <div class="field">
          <label for="password">შეიყვანეთ სასურველი პაროლი</label>
          <input type="password" name="password" id="password" class="input" required />
        </div>

        <!-- პაროლის დადასტურება -->
            <div class="field">
              <label for="confPass">გაიმეორეთ პაროლი</label>
              <input type="password" name="confPass" id="confPass" class="input" />
            </div>

         <!-- წესების დათანხმება -->

          <div class="field check">
          <input type="checkbox" name="checkbox" id="checkbox" class="input" required/>
          <label for="checkbox">ვეთანხმები წესებსა და პირობებს</label>
          
         </div>


        <!-- რეგისტრაცია -->

         <button class="btn" type="submit">რეგისტრაცია</button>

          <!-- ავტორიზაცია -->
           <p>
            თუ უკვე დარეგისტრირებული ხართ, გადადით აქ: 
            <a href="./images/cologne.jpg">ავტორიზაცია</a>
          </p>



          

        </form>
         </div>
        

    </div>
</div>















    
</body>
</html>
